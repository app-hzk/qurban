<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tabungan Qurban v1.0.0 (dev)</title>
  
  <meta name="theme-color" content="#1E88E5">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

  <style>
    :root {
      --primary: #1E88E5;
      --bg-global: #F4F6F9;
      --text-main: #2D3748;
      --text-muted: #718096;
      --glass-bg: rgba(255, 255, 255, 0.75);
      --glass-border: rgba(255, 255, 255, 0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
    body { background-color: var(--bg-global); color: var(--text-main); display: flex; justify-content: center; min-height: 100vh; }

    /* Mobile First Container */
    #app-container {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      background-color: #FFFFFF;
      position: relative;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
      display: flex;
      flex-direction: column;
    }

    /* Header & Indikator Status */
    .app-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
    .app-title { font-size: 18px; font-weight: 700; }

    .status-container {
      display: flex; align-items: center; background: var(--glass-bg);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--glass-border);
      padding: 6px 12px; border-radius: 20px;
    }
    .status-text { font-size: 11px; font-weight: 700; color: #2E7D32; margin-right: 6px; letter-spacing: 0.5px; }
    
    /* Efek Lampu Hijau */
    .status-dot { 
      width: 8px; height: 8px; background-color: #4CAF50; border-radius: 50%; 
      box-shadow: 0 0 8px #4CAF50; animation: pulse 2s infinite; 
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7); }
      70% { box-shadow: 0 0 0 8px rgba(76, 175, 80, 0); }
      100% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0); }
    }

    /* Glassmorphism Card Component */
    .glass-card { 
      background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); 
      border: 1px solid var(--glass-border); border-radius: 24px; padding: 24px; margin: 16px; 
      box-shadow: 0 8px 32px rgba(31, 38, 135, 0.04); 
    }
    
    .page-hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="app-container">
    <header class="app-header">
      <div class="app-title">Qurban Terpadu</div>
      <div class="status-container" id="sync-status">
        <span class="status-text">SYNCED</span>
        <div class="status-dot"></div>
      </div>
    </header>

    <main id="app-content">
      <div id="view-init" class="glass-card">
        <h3 style="margin-bottom: 12px; font-weight: 600;">Inisialisasi Sistem</h3>
        <p id="db-status-text" style="color: var(--text-muted); font-size: 14px;">Membuka koneksi ke Firebase...</p>
      </div>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getStorage } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

    // KUNCI KONFIGURASI: Ganti dengan objek config yang Anda dapatkan dari Firebase Console
    const firebaseConfig = {
‎  apiKey: "AIzaSyC-TOig0avtIPi38sdD7HKLrITm5L9A37k",
‎  authDomain: "qurban-rt-apps.firebaseapp.com",
‎  projectId: "qurban-rt-apps",
‎  storageBucket: "qurban-rt-apps.firebasestorage.app",
‎  messagingSenderId: "1044312403205",
‎  appId: "1:1044312403205:web:504471f63ce3f7ec49db6c"
‎};

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    async function checkDatabaseConnection() {
      const statusText = document.getElementById('db-status-text');
      try {
        await getDocs(collection(db, "users"));
        statusText.innerHTML = "🟢 Berhasil terhubung ke Firebase Firestore. Lingkungan kerja siap!";
        statusText.style.color = "#2E7D32";
      } catch (error) {
        console.error("Firebase Init Error:", error);
        statusText.innerHTML = "🔴 Gagal terhubung ke database. Periksa kembali API Key dan aturan Firestore.";
        statusText.style.color = "#C62828";
        
        // Ubah indikator lampu menjadi merah
        document.querySelector('.status-dot').style.backgroundColor = '#E53935';
        document.querySelector('.status-dot').style.boxShadow = '0 0 8px #E53935';
        document.querySelector('.status-text').innerText = 'OFFLINE';
        document.querySelector('.status-text').style.color = '#C62828';
      }
    }

    window.addEventListener('DOMContentLoaded', checkDatabaseConnection);
  </script>
</body>
</html>
